server:
  port: 8080

spring:
  application:
    name: ai-agent-assistant-backend

app:
  auth:
    username: ${APP_AUTH_USERNAME:admin}
    password: ${APP_AUTH_PASSWORD:admin1234}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  python-backend:
    # Spring 컨테이너가 내부 Docker 네트워크에서 FastAPI 컨테이너를 호출할 때 사용하는 주소입니다.
    # 로컬에서 Spring만 직접 실행할 경우 PYTHON_BACKEND_BASE_URL=http://localhost:8081 처럼 바꿔서 사용할 수 있습니다.
    base-url: ${PYTHON_BACKEND_BASE_URL:http://localhost:8080}
